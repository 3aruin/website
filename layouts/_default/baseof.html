<!DOCTYPE html>
<html lang="en">
<head>
  {{- partial "head.html" . -}}
  {{- partial "theme-preload.html" . -}}
  {{- block "extra_head" . }}{{ end -}}
</head>
<body data-print-source="{{ with .File }}{{ .LogicalName | default "index.html" }}{{ else }}404.html{{ end }}">

  <a class="skip-link" href="#main">Skip to main content</a>

  {{- partial "nav.html" . -}}

  <main id="main">
    {{- block "main" . }}{{ end -}}
  </main>

  <script src="/js/theme.js" defer></script>
</body>
</html>
