{{/* Theme toggle button — pulled out of nav.html so both branches of the
     conditional (with and without section nav-links) reuse the same markup.
     B-029's chrome-extraction principle applied one level deeper. */}}
<button class="theme-toggle" id="themeToggle"
        aria-pressed="false" aria-label="Toggle light and dark theme"
        title="Toggle light/dark">
  <svg class="moon" aria-hidden="true" focusable="false" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
  <svg class="sun" aria-hidden="true" focusable="false" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
  </svg>
</button>
